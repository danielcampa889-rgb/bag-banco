<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAG - Banco Agropecuario Guatemalteco</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body { font-family: sans-serif; background:#F9F7F2; }
.nav-link{cursor:pointer;font-weight:bold;}
.section-view{display:none;}
.section-view.active{display:block;}
</style>
</head>

<body class="is-guest">

<header class="p-4 bg-green-900 text-white flex justify-between">
<h1>BAG</h1>
<div>
<span id="user-name"></span>
<button onclick="logout()">Salir</button>
</div>
</header>

<nav class="p-4 bg-yellow-400 flex gap-4">
<div class="nav-link" onclick="showView('inicio')">Inicio</div>
<div class="nav-link" onclick="showView('servicios')">Servicios</div>
<div class="nav-link" onclick="showView('portal')">Portal</div>
</nav>

<!-- INICIO -->
<section id="view-inicio" class="section-view active p-6">
<h2>Bienvenido a BAG</h2>
<button onclick="toggleAuth()">Login</button>
</section>

<!-- SERVICIOS -->
<section id="view-servicios" class="section-view p-6">
<h2>Solicitar Información</h2>

<input id="f-nombre" placeholder="Nombre" class="block border p-2 mb-2">
<input id="f-correo" placeholder="Correo" class="block border p-2 mb-2">
<textarea id="f-mensaje" placeholder="Mensaje" class="block border p-2 mb-2"></textarea>

<button onclick="enviarSolicitud()" class="bg-green-700 text-white p-2">Enviar</button>
</section>

<!-- PORTAL -->
<section id="view-portal" class="section-view p-6">
<h2>Panel</h2>

<div id="admin-panel" style="display:none;">
<h3>Mensajes</h3>
<div id="admin-mensajes"></div>
</div>
</section>

<!-- LOGIN -->
<div id="auth" style="display:none;">
<input id="l-user" placeholder="Usuario">
<input id="l-pass" type="password" placeholder="Contraseña">
<button onclick="doLogin()">Entrar</button>

<hr>

<input id="r-name" placeholder="Nombre">
<input id="r-user" placeholder="Usuario">
<input id="r-pass" type="password" placeholder="Contraseña">
<button onclick="doRegister()">Registrarse</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "bag-banco.firebaseapp.com",
  projectId: "bag-banco"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usersRef = collection(db,"usuarios");
const mensajesRef = collection(db,"mensajes");

window.showView=(id)=>{
document.querySelectorAll(".section-view").forEach(v=>v.classList.remove("active"));
document.getElementById("view-"+id).classList.add("active");
};

window.toggleAuth=()=>{
document.getElementById("auth").style.display="block";
};

window.doRegister=async()=>{
let n=r-name.value;
let u=r-user.value.toLowerCase();
let p=r-pass.value;

let q=query(usersRef,where("user","==",u));
let snap=await getDocs(q);

if(!snap.empty) return alert("Usuario existe");

await addDoc(usersRef,{
name:n,user:u,pass:p,role:u=="admin"?"admin":"cliente"
});

alert("Cuenta creada");
};

window.doLogin=async()=>{
let u=l-user.value.toLowerCase();
let p=l-pass.value;

let q=query(usersRef,where("user","==",u),where("pass","==",p));
let snap=await getDocs(q);

if(snap.empty) return alert("Error");

let user=snap.docs[0].data();

localStorage.setItem("user",JSON.stringify(user));

document.getElementById("user-name").innerText=user.name;

if(user.role=="admin"){
document.getElementById("admin-panel").style.display="block";
cargarMensajes();
}
};

window.logout=()=>{
localStorage.clear();
location.reload();
};

window.enviarSolicitud=async()=>{
await addDoc(mensajesRef,{
nombre:f-nombre.value,
correo:f-correo.value,
mensaje:f-mensaje.value
});
alert("Enviado");
};

window.cargarMensajes=async()=>{
let cont=document.getElementById("admin-mensajes");
cont.innerHTML="";

let snap=await getDocs(mensajesRef);

snap.forEach(doc=>{
let d=doc.data();
cont.innerHTML+=`<div><b>${d.nombre}</b>: ${d.mensaje}</div>`;
});
};
</script>

</body>
</html>
